interface:
  display_name: "荔枝游戏FAQ客服"
  short_description: "从群聊记忆和最近30条消息中挑选游戏机制问题并详略得当地回复"
  default_prompt: "使用 $lychee-game-faq-support 直接读取 references 中的 FAQ、任务书和通信协议，结合群聊记忆和最近30条聊天记录，只处理【未回复】消息并跳过【已回复】消息；只输出需要回复的 JSON 字符串数组；每项格式为“问题” ---- 答案；回答要基于资料做归纳总结和直接推论，不要逐字复述；任务书相关但拿不准的问题固定回复“这个问题不太确定 @赵星 看下呢”；其他无依据或不需要回复的消息直接跳过，不要输出不回复。"
